<!DOCTYPE html>
<html>
    
<head>
    <meta charset="utf-8" />
    <title>Ponete el delantal</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" type="image/svg+xml" href="img/svg/logo.svg">
</head>

<body>
    <header>
        <a href="index.html"><img src="img/svg/logo.svg" alt="" width="65" height="55" /></a>
        <div class="buscador">
            <img src="img/svg/icono-lupa.svg" alt="" width="25" height="25" />
        </div>
        <nav class="botonera">
            <a href="index.html">Inicio</a>
            <a href="recetario.html">Recetario</a>
            <a href="sobremi.html">Sobre mí</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>
    <main>
        <section id="contactar">
            <div id="formulario">
                <h2>Contactame</h2>
                <form method="post" action="mailto:maria.lujan.leiva@gmail.com" subject="Contacto desde el sitio web" target="_blank" enctype="text/plain">
                    <div class="form">
                        <label for="nombre">Nombre:</label>
                        <input type="text" name="nombre" id="nombre" placeholder="Ej.: Juan" required>
                        <label for="email">Email:</label>
                        <input type="email" name="email" id="email" placeholder="Email" required>
                        <label for="mensaje">Mensaje:</label>
                        <textarea name="mensaje" id="mensaje" placeholder="Mensaje" required></textarea>
                    </div>
                    <div class="botones">
                        <button type="submit">Enviar</button>
                        <button type="reset">Limpiar</button>  
                    </div>
                </form>
            </div>
            <div id="subscripcion">
                <h4>Subscribite a mi newsletter</h4>
                <button id="boton-subscripcion">Subscribirse</button>
                <h4>Seguime en mis redes</h4>
                <div id="logos">   
                    <a href="https://www.facebook.com/Poneteeldelantal?ref=hl"><img src="img/svg/facebook.svg" alt="" width="25" height="25" /></a>
                    <a href="https://www.instagram.com/poneteeldelantal/"><img src="img/svg/instagram.svg" alt="" width="25" height="25" /></a>
                </div>
            </div>
        </section>    
    </main>
</body>
</html>
